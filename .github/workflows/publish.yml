name: Publish feature-control

# Publishes the shared library to GitHub Packages when a version tag is pushed (e.g. v0.1.0),
# so the 30+ apps can consume com.example.platform:feature-control by version.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish feature-control
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :feature-control:publishMavenPublicationToGitHubPackagesRepository --no-daemon

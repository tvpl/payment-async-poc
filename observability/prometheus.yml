global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: payment-simulation-api
    metrics_path: /prometheus
    static_configs:
      - targets: ['api-service:8080']

  - job_name: payment-sbus
    metrics_path: /prometheus
    static_configs:
      - targets: ['sbus-service:8081']

  - job_name: payment-core-mock
    metrics_path: /prometheus
    static_configs:
      - targets: ['core-mock:8082']

  - job_name: feature-demo
    metrics_path: /prometheus
    static_configs:
      - targets: ['feature-demo:8083']

  - job_name: async-redis-service
    metrics_path: /prometheus
    static_configs:
      - targets: ['async-redis-service:8084']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  # Infra exporters (server-side metrics for the Redis/Postgres/Kafka dashboards).
  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']

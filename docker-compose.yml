services:
  # ------------------------------------------------------------------ infra
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    restart: unless-stopped
    ports:
      - "29092:29092"   # host access (localhost:29092)
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_TOPIC_RF: ${KAFKA_TOPIC_RF:-1}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        BS=kafka:9092
        RF=$${KAFKA_TOPIC_RF:-1}
        PARTS=$${KAFKA_TOPIC_PARTITIONS:-3}
        for t in payment.simulation.requested payment.simulation.core.command \
                 payment.simulation.core.response payment.simulation.completed \
                 payment.simulation.failed payment.simulation.dlq \
                 payment.simulation.requested.retry payment.simulation.core.response.retry; do
          kafka-topics.sh --bootstrap-server $$BS --create --if-not-exists \
            --topic $$t --partitions $$PARTS --replication-factor $$RF
        done
        echo "topics created:"; kafka-topics.sh --bootstrap-server $$BS --list

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sbus}
      POSTGRES_USER: ${POSTGRES_USER:-sbus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sbus}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sbus}"]
      interval: 5s
      timeout: 3s
      retries: 10

  apicurio-registry:
    image: apicurio/apicurio-registry-mem:2.6.2.Final
    container_name: apicurio-registry
    restart: unless-stopped
    ports:
      - "8085:8080"   # registry UI/API on host:8085
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/apis/registry/v2/system/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8088:8080"   # Kafka UI on host:8088 — browse topics, messages, consumer lag
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      # Apicurio exposes a Confluent-compatible API; lets the UI decode Avro payloads.
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://apicurio-registry:8080/apis/ccompat/v6
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy

  # ---------------------------------------------------------- observability
  # The observability stack is gated behind the "observability" compose profile,
  # which is enabled by default via COMPOSE_PROFILES in .env. Run a lean stack
  # (apps + infra only) with: COMPOSE_PROFILES= docker compose up   (or: make up-core)
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: otel-collector
    restart: unless-stopped
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otel-collector.yml:ro
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Receive k6 metrics (remote write) and store exemplars (metric -> trace links).
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Infra exporters feed the Redis / PostgreSQL / Kafka dashboards with real
  # server-side metrics (in addition to the app-side Micrometer metrics).
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: redis-exporter
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-sbus}:${POSTGRES_PASSWORD:-sbus}@postgres:5432/${POSTGRES_DB:-sbus}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    restart: unless-stopped
    profiles: ["observability"]
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

  # ------------------------------------------------------------- application
  # All three apps share a single Dockerfile (multi-target). BuildKit builds the
  # common `build` stage once and reuses it per target, so the project is compiled
  # a single time instead of once per service.
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: api-service
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      APICURIO_REGISTRY_URL: http://apicurio-registry:8080/apis/registry/v2
      SBUS_BASE_URL: http://sbus-service:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PAYMENT_SECURITY_ENABLED: ${PAYMENT_SECURITY_ENABLED:-true}
      PAYMENT_API_KEY: ${API_KEY:-dev-key-change-me}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  sbus-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: sbus
    container_name: sbus-service
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-sbus}
      POSTGRES_USER: ${POSTGRES_USER:-sbus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sbus}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      APICURIO_REGISTRY_URL: http://apicurio-registry:8080/apis/registry/v2
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  core-mock:
    build:
      context: .
      dockerfile: Dockerfile
      target: core
    container_name: core-mock
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APICURIO_REGISTRY_URL: http://apicurio-registry:8080/apis/registry/v2
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # Tunable simulated Core behavior (for didactic demos: backpressure, DLQ, timeouts).
      CORE_LATENCY_MIN_MS: ${CORE_LATENCY_MIN_MS:-50}
      CORE_LATENCY_MAX_MS: ${CORE_LATENCY_MAX_MS:-300}
      CORE_DECLINE_PCT: ${CORE_DECLINE_PCT:-10}
      CORE_FAIL_PCT: ${CORE_FAIL_PCT:-0}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
      apicurio-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

volumes:
  kafka-data:
  pg-data:
  prometheus-data:
  grafana-data:

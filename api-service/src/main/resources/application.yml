micronaut:
  application:
    name: payment-simulation-api
  server:
    port: 8080
  metrics:
    enabled: true
    binders:
      jvm:
        enabled: true
      kafka:
        enabled: true
    export:
      prometheus:
        enabled: true
        step: PT10S
        descriptions: true
  # The BLOCKING executor is backed by virtual threads on JDK 21+, so the POST
  # handler can park cheaply while waiting for the async result.
  security:
    # JWT is used only to identify the caller for feature/v0 gating. Everything is anonymous at the
    # security layer (existing routes stay guarded by the X-API-Key filter; v0/admin self-enforce
    # from the JWT), so enabling security does not change the tested /payment-simulations flow.
    authentication: bearer
    reject-not-found: false
    intercept-url-map:
      # Admin (runtime flag control) requires the ROLE_ADMIN role from the JWT.
      - pattern: /admin/**
        access:
          - ROLE_ADMIN
      # Everything else is anonymous at the security layer (existing routes stay guarded by the
      # X-API-Key filter; v0 self-enforces from the JWT), so enabling security does not change the
      # tested /payment-simulations flow.
      - pattern: /**
        access:
          - isAnonymous()
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_SIGNATURE_SECRET:`dev-feature-control-signing-secret-change-me-32b+`}
              jws-algorithm: HS256

# Feature control (shared lib). Baseline flags; Redis overrides them at runtime via /admin/features.
platform:
  features:
    redis-enabled: ${FEATURES_REDIS_ENABLED:true}
    cache-ttl: 5s
    key-prefix: "feature:"
    flags:
      # v0 API is restricted to the v0-testers group (recognized from the JWT).
      payment-api-v0:
        type: ALLOWLIST
        enabled: true
        allowed-groups:
          - v0-testers
        on-variant: v0
        off-variant: v1
      # Route the requested event to topic A or B (off by default -> the normal topic).
      payment-topic-ab:
        type: PERCENTAGE
        enabled: false
        percentage: 0
        on-variant: payment.simulation.requested.v0
        off-variant: payment.simulation.requested

payment:
  simulation:
    wait-timeout: 3s
    status-ttl: 15m
    idempotency-ttl: 15m
    response-channel: payment-sim-responses
    rate-limit:
      limit-for-period: 200
      refresh-period: 1s
  security:
    # API-key auth (PoC). Production: JWT/OAuth2 + mTLS. Override keys via env/secret.
    enabled: ${PAYMENT_SECURITY_ENABLED:true}
    api-keys:
      - ${PAYMENT_API_KEY:dev-key-change-me}

sbus:
  base-url: ${SBUS_BASE_URL:`http://localhost:8081`}

redis:
  uri: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

kafka:
  bootstrap:
    servers: ${KAFKA_BOOTSTRAP_SERVERS:`localhost:9092`}
  consumers:
    default:
      key:
        deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value:
        deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
  producers:
    default:
      acks: all
      enable.idempotence: true
      key:
        serializer: org.apache.kafka.common.serialization.StringSerializer
      value:
        serializer: org.apache.kafka.common.serialization.ByteArraySerializer

apicurio:
  registry:
    url: ${APICURIO_REGISTRY_URL:`http://localhost:8085/apis/registry/v2`}

otel:
  service:
    name: payment-simulation-api
  traces:
    exporter: otlp
  metrics:
    exporter: none
  exporter:
    otlp:
      # Plain default avoids the colon being mis-parsed in a ${VAR:default} placeholder.
      # Override at runtime with env OTEL_EXPORTER_OTLP_ENDPOINT (Micronaut maps it here).
      endpoint: http://localhost:4317

endpoints:
  all:
    enabled: true
    sensitive: false
  health:
    enabled: true
    details-visible: ANONYMOUS
  prometheus:
    enabled: true
    sensitive: false
